<p>《<b>洛克王国：世界</b>》是一款由<a href="/%E8%85%BE%E8%AE%AF%E6%B8%B8%E6%88%8F" title="腾讯游戏">腾讯游戏</a>发行，<a href="/%E9%AD%94%E6%96%B9%E5%B7%A5%E4%BD%9C%E5%AE%A4%E7%BE%A4" title="魔方工作室群">魔方工作室群</a>魔镜工作室开发并运营的开放世界回合制RPG游戏，为《<a href="/%E6%B4%9B%E5%85%8B%E7%8E%8B%E5%9B%BD" title="洛克王国">洛克王国</a>》延伸IP作品。
</p>
<meta property="mw:PageProp/toc" />
<div class="mw-heading mw-heading2"><h2 id="游戏简介"><span id=".E6.B8.B8.E6.88.8F.E7.AE.80.E4.BB.8B"></span>游戏简介</h2></div>
<p>《洛克王国：世界》是由腾讯游戏魔方工作室群魔镜工作室打造的“<a href="/%E6%B4%9B%E5%85%8B%E7%8E%8B%E5%9B%BD" title="洛克王国">洛克王国</a>”IP续作。游戏中，玩家将在与<span style="background-color:#FFFF007F">精灵</span><sup class="annotation"><span style="color:royalblue">(注)</span><span class="annotation-content">原作为“宠物”</span></sup>共存的幻想世界里，扮演一名学院新生，在旅途中逐步了解这个世界，与精灵为伴，并在危机时刻做出选择。游戏以精灵捕捉培养为牵引，以开放世界探索为承载，以阵容构筑和回合策略为手段，为玩家打造一个益智、有趣、宏大且充满正能量的幻想世界。<sup id="cite_ref-biligame_2-0" class="reference"><a href="#cite_note-biligame-2"><span class="cite-bracket">&#91;</span>2<span class="cite-bracket">&#93;</span></a></sup>
</p>
<hr />
<p>游戏采用清新明快的色调和圆润可爱的场景设计，考据完整，制作精良。从广袤的草原到壮丽的山脉，从迷人的湖泊到神秘的森林，从热闹的街道到宏伟的城堡，每一个场景都让人感到身临其境。 
</p><p>可爱的精灵也是游戏中极具吸引力的元素。玩家可以自由地探索游戏世界，与各种精灵作伴，完成各种任务和挑战。游戏中有各种各样的精灵，它们都有着独特的特点和技能，可以帮助玩家在游戏中战胜强大的敌人和解决各种难题。
</p><p>游戏中的战斗采用回合制，玩家需要根据自己的精灵和技能来组合出最佳的战斗阵容，战胜各种强大的敌人。这个游戏非常考验玩家的策略，每一个回合都需要仔细思考，因为一步的错误可能会导致整个战斗的失败。<sup id="cite_ref-biligame_2-1" class="reference"><a href="#cite_note-biligame-2"><span class="cite-bracket">&#91;</span>2<span class="cite-bracket">&#93;</span></a></sup>
</p>

                                iframe.attr("data-src", `${iframe_href_base + prefix.iframe}=${id}&page=${page}${tIsInvalid ? "" : `&t=${t}`}`);
                                lazyLoadObserver.observe(iframe[0]);
                                console.info("Widget:BilibiliVideo", `${prefix.href}${id}`, code, message);
                                const errorType = getErrorType(code);
                                if (errorType) {
                                    ids[errorType][prefix.iframe].add(id);
                                }
                                return;
                            }
                            const list = data.pages;
                            let _page = 1;
                            const name = title || (data.title || prefix.href + id);
                            let index;
                            let length;
                            if (pagename) {
                                for (index = 0, length = list.length; index < length; index++) {
                                    if (list[index].part !== pagename) { continue; }
                                    _page = list[index].page;
                                    break;
                                }
                            } else { _page = page; }
                            index = _page - 1;
                            const href = title_text.attr("href");
                            if (list[index] !== undefined && list[index].cid !== undefined) {
                                iframe.attr("data-src", `${iframe_href_base}${prefix.iframe}=${id}&cid=${list[index].cid}&page=${_page}${tIsInvalid ? "" : `&t=${t}`}`);
                                title_text.attr("href", href.replace(new RegExp(`\\?p=${page}`, "g"), `?p=${_page}`));
                                title_text.text(`${name} [${_page}/${list.length}]${tIsInvalid ? "" : `[视频从${time}开始播放]`}`);
                                if (subtitle) { title_text.append(`<br>（${_page}、${list[index].part}）`); }
                            } else {
                                title_text.text(name + (tIsInvalid ? "" : `[视频从${time}开始播放]`));
                                iframe.attr("data-src", `${iframe_href_base + prefix.iframe}=${id}&page=${_page}${tIsInvalid ? "" : `&t=${t}`}`);
                            }
                            lazyLoadObserver.observe(iframe[0]);
                        },
                        error: () => {
                            title_text.text((title || prefix.href + id) + ([0, 1].includes(page) ? "" : ` (P${page})`) + (tIsInvalid ? "" : `[视频从${time}开始播放]`));
                            iframe.attr("data-src", `${iframe_href_base + prefix.iframe}=${id}&page=${page}${tIsInvalid ? "" : `&t=${t}`}`);
                            lazyLoadObserver.observe(iframe[0]);
                        },
                        complete: () => {
                            if (selfbox.is('[data-auto-expand="true"]')) {
                                selfbox.addClass("onshow");
                                iframeContainer.show();
                                toggleButton.text("隐藏视频");
                                selfbox.removeAttr("style");
                            }
                            submit(ids);
                        },
                    });
                    //toggle
                    toggleButton.on("click", () => {
                        selfbox.width(iframeContainer.outerWidth(true));
                        selfbox.toggleClass("onshow");
                        iframeContainer.toggle();
                        if (toggleButton.text() === "显示视频") {
                            toggleButton.text("隐藏视频");
                            $(window).resize();
                        } else {
                            toggleButton.text("显示视频");
                            selfbox.removeAttr("style");
                        }
                    });
                    widescreenButton.on("click", () => {
                        if (selfbox.is(":not(.onshow)")) { return; }
                        if (selfbox.is(".widescreen")) {
                            selfbox.removeClass("widescreen");
                            widescreenButton.text("显示宽屏");
                            recallWH(iframeContainer);
                            recallWH(iframe);
                            recallWH(selfbox);
                        } else {
                            selfbox.addClass("widescreen");
                            widescreenButton.text("退出宽屏");
                            rememberWH(selfbox);
                            selfbox.css("width", selfbox.parent().width() > Math.min(911, global_element.width()) ? "73%" : "100%"); //可以看见按钮的最小宽度 665 的 1/0.73 倍
                            setTureHeight(selfbox);
                            rememberWH(iframe);
                            rememberWH(iframeContainer);
                            setWH(iframe);
                            setWH(iframeContainer);
                            iframeContainer.height(selfbox.height() - title_text.parent().height());
                            setMaxHeight(selfbox, iframeContainer);
                        }
                    });
                });
            };
            $(run);
            mw.hook("wikipage.content").add(run);
            $(window).on("load", run);
            $(window).on("resize", () => {
                $(".bilibili-video-container.onshow.widescreen").each((_, ele) => {
                    const selfbox = $(ele);
                    selfbox.css("width", selfbox.parent().width() > Math.min(911, global_element.width()) ? "73%" : "100%");
                    setTureHeight(selfbox);
                    setMaxHeight(selfbox, selfbox.find(".bilibili-iframe-container"));
                });
            });
        } catch (e) {
            /* eslint-disable */
            var msg = genErr("error", navigator.userAgent + " : " + e + " " + e.stack.split("\n")[1].trim());
            $(".bilibili-video-container").each(function (_, ele) {
                ele.outerHTML = msg;
            });
            /* eslint-enable */
        }
    }
]);
</script>

<div class="notice metadata" id="spoiler"><span typeof="mw:File"><span><img src="https://storage.moegirl.org.cn/moegirl/commons/d/dc/Nuvola_apps_important_yellow.svg!/fw/20?v=20170217121952" decoding="async" width="20" height="17" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/d/dc/Nuvola_apps_important_yellow.svg!/fw/30?v=20170217121952 1.5x, https://storage.moegirl.org.cn/moegirl/commons/d/dc/Nuvola_apps_important_yellow.svg!/fw/40?v=20170217121952 2x" data-file-width="600" data-file-height="500" /></span></span><b>除非特别注明，否则本条目所有时间皆以东八区时间（UTC+8，AWST－澳大利亚西部标准时间，CST－中国标准时间）为准</b>。</div>
<table class="mw-collapsible mw-collapsed wikitable">
<tbody><tr>
<th>二测相关事件</th>
</tr>
<tr>
<td>
<p>二测相关事件是「等等鸭测试」前后，因宣发、测试资格的发放和传火活动的设置等争议而引发的一连串事件的总和。
</p><p><b>分批发放</b>：一般情况下，游戏测试的资格都是一次性发放，但是《洛克王国：世界》的官方决定测试将资格在3月17日、3月21日、3月25日分批次发放，并在预约界面标明拉人越多，获得资格的概率越大。<sup id="cite_ref-9" class="reference"><a href="#cite_note-9"><span class="cite-bracket">&#91;</span>9<span class="cite-bracket">&#93;</span></a></sup>此举被玩家批评为“饥饿营销”。
</p><p><b>误伤玩家</b>：2025年3月17日晚，官方在打击账号倒卖时，误伤部分正常玩家。不久后官方恢复了被误伤玩家的资格。<sup id="cite_ref-10" class="reference"><a href="#cite_note-10"><span class="cite-bracket">&#91;</span>10<span class="cite-bracket">&#93;</span></a></sup>
</p><p><b>倒卖账号</b>：官方没有限制被传火的账号再次传火，这意味着一个人虽然只能邀请一位好友，但通过这位好友可以继续邀请下一个人。二测开始后，大量黄牛利用传火活动刷取测试资格，并放在闲鱼上贩卖。<sup id="cite_ref-11" class="reference"><a href="#cite_note-11"><span class="cite-bracket">&#91;</span>11<span class="cite-bracket">&#93;</span></a></sup>玩家发现后纷纷在微博和b站<a target="_blank" rel="nofollow noreferrer noopener" class="external text" href="https://www.bilibili.com/read/cv41139226">评论区</a>表达不满，评论数很快突破8000。3月22日，官方宣布打击资格倒卖行为。<sup id="cite_ref-12" class="reference"><a href="#cite_note-12"><span class="cite-bracket">&#91;</span>12<span class="cite-bracket">&#93;</span></a></sup>4月24日，官方公布部分打击成果。<sup id="cite_ref-13" class="reference"><a href="#cite_note-13"><span class="cite-bracket">&#91;</span>13<span class="cite-bracket">&#93;</span></a></sup>
</p><p><b>举办比赛</b>：2025年4月21日，官方宣布举办「闪耀大师邀请赛」。有网友在评论区表示反对，认为在内测时举办比赛对没拿到资格的玩家不公平，而且违背行业惯例。<sup id="cite_ref-14" class="reference"><a href="#cite_note-14"><span class="cite-bracket">&#91;</span>14<span class="cite-bracket">&#93;</span></a></sup>
</p>
</td>
</tr>
</tbody></table>
<table class="mw-collapsible mw-collapsed wikitable">
<tbody><tr>
<th>宣传片卡背事件</th>
</tr>
<tr>
<td>
<p>宣传片卡背事件，是指宣传片《不卖！不卖！不卖！》发布后，因卡背素材问题引发的争议。
</p><p>2026年3月22日（开服前四天），官方发布了宣传片《不卖！不卖！不卖！》。视频第一部分以一只鹦鹉在一排卡片上排便的形式，表达游戏策划“<b>不抽卡、不卖精灵、不卖数值</b>”<sup id="cite_ref-15" class="reference"><a href="#cite_note-15"><span class="cite-bracket">&#91;</span>15<span class="cite-bracket">&#93;</span></a></sup>的承诺。视频发布后，有网友指出，片中卡背的底图使用了《<a href="/%E5%93%88%E5%88%A9%E6%B3%A2%E7%89%B9%EF%BC%9A%E9%AD%94%E6%B3%95%E8%A7%89%E9%86%92" title="哈利波特：魔法觉醒">哈利波特：魔法觉醒</a>》的周边素材，中间的图标则疑似盗用了《原神》<a href="/%E6%84%9A%E4%BA%BA%E4%BC%97" title="愚人众">愚人众</a>的图标。<sup id="cite_ref-16" class="reference"><a href="#cite_note-16"><span class="cite-bracket">&#91;</span>16<span class="cite-bracket">&#93;</span></a></sup>此事迅速引发关注，视频下方出现大量相关的评论。
</p><p>事件发酵后，官方对所有争议卡背进行了打码处理并替换了原视频，相关曝光视频也被投诉下架。
</p>
</td>
</tr>
</tbody></table>
<table class="mw-collapsible mw-collapsed wikitable">
<tbody><tr>
<th>S2赛季改动相关争议</th>
</tr>
<tr>
<td>
<p>2026年5月18日，洛克王国世界官方发布了S2赛季“狂欢怪谈”的详细更新前瞻，其中对游戏的平衡性进行了巨大幅度的调整，很多强力精灵和配队几乎被砍废，在玩家社区引起巨大争议，对于玩家社区关于平衡性调整的争议，官方并没有做出表态，只是承诺会推出精灵回溯功能，让玩家可以回收培养精灵的资源，但是还是有很多玩家认为这样的声明毫无诚意。<br />
5月21日，S2赛季正式上线，然而玩家注意到女洛克的大量动作被修改，包括战败后的鸭子坐动作、乘骑时的动作、炼金时的动作等等，而且这些动作修改并没有在更新公告中提及，并且有玩家发现，在S1赛季的时候，小红书就有一小撮投诉女洛克动作的帖子，这一发现瞬间引爆了玩家社区，结合之前官方不回应玩家对平衡性修改不满的行为，大量玩家质疑官方是在区别对待男女玩家的意见，故意偏向女玩家。<br />
与此同时，又有玩家发现，洛克王国世界的微博超话主持人多次公开发表辱骂、仇视男玩家的言论，因此玩家认为制作组内部已经被女拳人士渗透，修改女洛克动作是故意向女玩家低头，自此舆论彻底爆炸。<br />
随着部分玩家开始深入游玩S2赛季，发现了更严重的问题，大量精灵的生态细节消失、乘骑精灵后精灵表情不再变化，以及随处可见的穿模和卡出地图BUG，包括开服时期已经被修复的脱鞋bug等一系列bug卷土重来......这完全不像是能端出惊艳无比的S1赛季的制作组应有的水平，因此部分玩家认为洛克王国世界是成绩太好而被摘了桃子，空降了新的制作团队，老团队已经被调走。<br />
5月22日，洛克王国世界官方发布公告，承诺会修改问题，并开除了涉事超话主持人，给了全服2个棱镜球作为补偿，但该公告并没有解释问题发生的原因，玩家并不买账，被骂了整整100万楼<sup id="cite_ref-17" class="reference"><a href="#cite_note-17"><span class="cite-bracket">&#91;</span>17<span class="cite-bracket">&#93;</span></a></sup>。<br />
5月24日，洛克王国世界发布不停机更新，修正了部分美术资源，并承诺洛克的动作的自定义功能正在开发中，将于5月28日实装<sup id="cite_ref-18" class="reference"><a href="#cite_note-18"><span class="cite-bracket">&#91;</span>18<span class="cite-bracket">&#93;</span></a></sup>。<br />
5月24日，洛克王国世界主策划开水发布公告正式向玩家致歉，回应了部分玩家的质疑，比如生态细节丢失是美术资源对接不畅导致，并没有更换团队，并承诺未来一切修改必定会在公告中声明，同时也给了全服1个织梦棱镜球+10个棱镜球+性格修改道具等补偿<sup id="cite_ref-19" class="reference"><a href="#cite_note-19"><span class="cite-bracket">&#91;</span>19<span class="cite-bracket">&#93;</span></a></sup>。<br />
5月26日，洛克王国世界发布不停机更新，提前实装了原计划5月28日实装的洛克动作自定义功能。随后事件热度逐渐消退。
</p>
</td>
</tr>

<div class="mw-heading mw-heading2"><h2 id="相关梗"><span id=".E7.9B.B8.E5.85.B3.E6.A2.97"></span>相关梗</h2></div>
<div class="mw-heading mw-heading3"><h3 id="真正的王世界"><span id=".E7.9C.9F.E6.AD.A3.E7.9A.84.E7.8E.8B.E4.B8.96.E7.95.8C"></span>真正的王世界</h3></div>
<p>“王世界”原本指的是腾讯的另一款主推手游《<a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80%E4%B8%96%E7%95%8C" title="王者荣耀世界">王者荣耀世界</a>》，由于是腾讯旗下最火的游戏IP的衍生作、由腾讯旗下的一线制作组天美工作室主导、开发了6年时间、投入了极其巨大的开发资金等等，大量玩家对此都无比期待，认为必定会在国产手游圈掀起一轮热潮，然而游戏实际上线后，无论是热度还是营收表现都不尽人意，远远对不起玩家的期待，相反，在上线前关注度相对较低的《洛克王国：世界》在正式上线后的一段时间内表现惊人，无论是玩家口碑还是营收表现都远远非常优秀，更加衬托得《王者荣耀世界》的表现非常尴尬，因此玩家间开始有“谁说洛克王国世界不是王世界”“真正的王世界”等等的调侃。<s class="just-kidding-text" title="只为博君一笑，不必照单全收XD">然而本作在最风生水起的时候又爆发了S2赛季的巨大风波，口碑与营收断崖式下跌，可见“王世界”这个称呼或许是个诅咒。</s>
</p>
<div class="mw-heading mw-heading3"><h3 id="XXX的小曲"><span id="XXX.E7.9A.84.E5.B0.8F.E6.9B.B2"></span><a href="/Oo%E3%81%AE%E5%B0%8F%E6%9B%B2" title="Ooの小曲">XXX的小曲</a></h3></div>
<p>部分玩家发现，《洛克王国：世界》中部分精灵或NPC的特性和动画与一些歌曲形成了相当完美的契合，因此将这些动画和歌曲剪辑成了MV，传播速度非常快，其中比较著名的有雪影娃娃配《娃娃脸》、卷毛鸭配《雨爱》、<a href="/%E5%8F%AF%E4%B8%BD%E5%B8%8C%E4%BA%9A" title="可丽希亚">可丽希亚</a>配《入戏太深》等等。
</p>
<div class="mw-heading mw-heading3"><h3 id="奸商安妮"><span id=".E5.A5.B8.E5.95.86.E5.AE.89.E5.A6.AE"></span>奸商安妮</h3></div>
<table style="display: table; border-collapse: collapse; margin: auto; background-color:transparent;">
<tbody><tr>
<td style="vertical-align: top; color:#B2B7F2; font-size:36px; font-family:&#39;Times New Roman&#39;,serif; font-weight:bold; text-align:left; padding:10px 10px; line-height:100%">“</td>
<td style="text-align: left; padding: 1em; vertical-align: middle;">安妮最近......最近真的很难过....</td>
<td style="vertical-align: bottom; color:#B2B7F2; font-size:36px; font-family:&#39;Times New Roman&#39;,serif; font-weight:bold; text-align:left; padding:10px 10px; line-height:100%">”</td>
</tr>
</tbody></table>
<p>免费咕噜球的获取渠道有限，因此当剧情和地图探索送的咕噜球用完后，新的咕噜球就得花洛克贝购买了，而最常用的高级咕噜球的主要获取途径就是在游戏的NPC安妮处购买，但是定价极其昂贵，偏偏游戏对高级咕噜球的需求极大，因此玩家不得不想方设法赚钱买球，时间久了就开始抱怨安妮是个大奸商，时间长了也变成了梗，甚至<a target="_blank" rel="nofollow noreferrer noopener" class="external text" href="https://mp.weixin.qq.com/s/CkXdav4OUDffzjGBSwoTjQ">官方自己</a>也玩过这个梗。
</p>
<div class="mw-heading mw-heading2"><h2 id="阵容一览"><span id=".E9.98.B5.E5.AE.B9.E4.B8.80.E8.A7.88"></span>阵容一览</h2></div>
<div class="mw-heading mw-heading3"><h3 id="急急鸭测试"><span id=".E6.80.A5.E6.80.A5.E9.B8.AD.E6.B5.8B.E8.AF.95"></span>急急鸭测试</h3></div>
<table class="mw-collapsible mw-collapsed wikitable">
<tbody><tr>
<th>体系阵容介绍</th>
</tr>
<tr>
<td>
<ul><li><b>翼队（迅捷队）</b>：水魔法。锤头鹳开湿润，之后不断切皇家狮鹫和翼龙等精灵触发迅捷（一测迅捷在没应对的情况下强制先手），翼龙也可以依靠钢钻（威力等于两侧技能威力和的三分之一）配合需要蓄力的龙系高威力技能，最后依靠水血脉凡鹰特性的“迅捷触发两次”的被动超高额斩杀，专属技能8c且依照全队迅捷次数获得强化的疾风涡轮基本上可以穿盾杀人，能量不足时可以靠水魔法免费释放。</li>
<li><b>水队（雨天队）</b>：首领化。彩蝶鲨首领化免费开雨天，之后切换到天鹅和水灵等释放水系技能给彩蝶鲨叠进场时依己方水系招式次数减能耗，0能技能威力增加的特性，依靠彩蝶鲨的高速高魔攻和迅捷技能收割</li>
<li><b>遁地队</b>：草魔法。携带具有遁地技能的精灵，不断遁地减伤的同时切人拖延回合，或者獠牙猪水泡壳等用受击减费/随回合数提升威力的岩土暴击/水波术输出，最后换上波多西触发被动，依己方防御次数提升钢钻等技能的威力</li>
<li><b>冰队（霜降队）</b>：首领化。首领化胖猫开光合，雪影和甜甜等精灵给对手叠冻结，再用霜天加能耗（一测是10c但是永久加能耗），雪影被动的在场时依照冻结给对手加能耗和雪灵的能耗+2，并用霜降等技能尝试冻结满直接斩杀。
<ul><li><b>踩影冰队</b>：圣代甜甜靠霜天增加对手4能耗与冻结，再切换到冰钻布鲁斯（一测特性为冻结2层以上的敌人无法换人），基本上每用一个技能都要聚能一两个回合，之后使用龙之舞（后面的龙吟）和贪婪推队。</li></ul></li>
<li><b>幽队（控能队）</b>：叠加降灵印记让对手切人少能量，幻影灵菇幽影树轮换/花影羚羊站场持续偷能量，用阻断类技能阻止对手回能，幽冥眼无视0能对手的技能伤害，带翼龙压血线并用焚毁清湿润印记。因为一测幽系没有致胜的终端，选择带狮鹫推队。</li>
<li><b>虫队</b>：花衣蝶、化蝶等携带虫系精灵叠加奉献为虫群、啃咬技能施加永久加成，有迅捷能力的铠甲虫杀人后叠5奉献，携带虫血脉的星光狮或翼龙防音速犬/狮鹫等并叠奉献，同时触发绒仙子的“入场时依据队伍中系别数提升速度”的特性。
<ul><li><b>掩护虫队</b>：锤头鹳开湿润和棘刺印记（然后尽可能死切吧），虫系精灵靠0能耗的掩护不断紧急脱离随机切人，芋香巨角蛛掩护后回依靠特性叠两层毒磨对方站场精灵血线，面对毒系再用花衣蝶的虫群打死。</li>
<li><b>虫鸣虫队</b>：芋香巨角蛛、风滚暮虫、巨噬针鼹、铠甲虫携带虫鸣，暮使用盛开或者鼹依靠队里四虫叠4层特性提高虫鸣威力，蛛叠加中毒并开攻击场地给两层10威力的印记，花衣蝶给叠奉献铠甲虫靠迅捷的翼击和啃咬补刀，卷胡巨獭联防。</li></ul></li>
<li><b>萌队（萌化队）</b>：草魔法。用菊花梨、化蝶等精灵大量为敌方和己方赋予萌化，使魔翼鸟的月光合奏能打出大量连击数，以及触发卡洛儿特性依己方萌化层数减能耗，用6c高威力的涌泉推队，但是一测化蝶特性会被连击吃掉多条命所以不是很强。</li></ul>
</td>
</tr>
</tbody></table>
<table class="mw-collapsible mw-collapsed wikitable">
<tbody><tr>
<th>其他阵容介绍</th>
</tr>
<tr>
<td>
<ul><li><b>木偶强化队</b>：首领化。首领化魔力猫获得光合印记，然后切木偶靠随机己方技能开力量吞噬、泥浆铠甲、贪婪等状态技能，靠攻击技能收割，猫的酶浓度调整防御，蝙蝠和暗突袭吸血</li>
<li><b>刺蛇队（受队）</b>：草魔法，用雪灵（在场对手能耗增加）、蹦蹦花（寄生种子配合被动叠毒逼迫对手换人）、卡拉波斯（被动锁血基本上稳定叠三层印记）等精灵释放棘刺靠印记压对方血线，带獠牙猪防冰队，其他肉盾宠物轮防，最后草血脉寒音蛇（一测有140的最高基础速度，单萌系）触发被动根据己方状态技能使用次数加技能威力，靠草魔法的回血保证开强化后的健康状态，飞吻推队。</li></ul>
</td>
</tr>
</tbody></table>

<div class="mw-heading mw-heading3"><h3 id="同行测试"><span id=".E5.90.8C.E8.A1.8C.E6.B5.8B.E8.AF.95"></span>同行测试</h3></div>
<div class="mw-heading mw-heading3"><h3 id="S1暗夜拾光"><span id="S1.E6.9A.97.E5.A4.9C.E6.8B.BE.E5.85.89"></span>S1暗夜拾光</h3></div>
<table class="mw-collapsible mw-collapsed wikitable">
<tbody><tr>
<th>体系阵容介绍</th>
</tr>
<tr>
<td>
<ul><li><b>毒队</b>：</li>
<li><b>幻队（星陨队）</b>：愿力。</li>
<li><b>冰队（雪天队）</b>：首领化。依靠雪天和首领化雪影给对面持续叠加冻结，用月牙雪熊和雪巨人收割，骨龙用于轮防火和武系伤害，卡瓦狐仙雪影都可以开雪天，全队打击面包含地草火萌幽龙电武（然而带冰布丁的队尤其是三三可以单刷）。</li>
<li><b>火队</b>：首领化。火神首领化前期给对面施加压力并压状态，该卖就卖，叠加火系技能使用次数来给火焰猿烈火守护被动打底。中期靠火焰猿接着火神继续压场，炽心勇狮小皮球燃薪虫轮防使猿重新满能上场。残局烈火守护上场，12层左右被动，全技能加120威力来推队。</li>
<li><b>虫队</b>：首领化。</li></ul>
</td>
</tr>
</tbody></table>
<table class="mw-collapsible mw-collapsed wikitable">
<tbody><tr>
<th>其他阵容介绍</th>
</tr>
<tr>
<td>
<ul><li><b>宝马队</b>：首领化。独角兽首领化和蹦床松鼠（在你首领给黑猫或圣剑时）都能推队，利灯鱼叠湿润印记，</li>
<li><b>狼王队</b>：首领化。以恶魔狼为终端处理残局的队伍。狼依靠队友死后加攻可以在登场时获得恐怖的攻击力，依靠杀人后回6c的吞噬和其他优质攻击技能推队。携带了十分超模的黑猫和音速犬作为备选首领化对象。海枝枝（绿）找机会和对面状态不好的精灵对位，让对面选择送掉或者换人给海枝枝推队机会。卡瓦重（白）可以学速冻给对面减速印记，且特性死后不掉魔力让狼王多叠一次被动，狗可以清印记针对星陨和毒队。</li></ul>
<p>狼很容易被化蝶三三悠悠棋后单杀，所以低分表现可以高分罕见。
</p>
<ul><li><ul><li><b>轮转狼王队</b>：带小皮球和化蝶换掉卡瓦重，思路发生变化，从让队友当摔炮狼来推队变得偏向轮转，黑猫不带彗星改为其他输出技能，音速犬和黑猫开局靠特性/魔能爆打出大量伤害，小皮球靠特性自动进场用加大功率给猫狗充能，很多时候狼会提前进场。化蝶可以萌化给对面主c降速起到速冻的作用，嗜痛防连击技能并获得破罐破摔杀人的机会，破罐破摔打狼王和帕尔很多时候能打死。</li></ul></li></ul>
<p>（和翼王三三队的三三一样，轮转狼王队的狼王也成噱头了）
</p>
<ul><li><b>雪影队</b>：首领化。依靠首领化雪影轮转给对面叠加冻结并加能耗，</li>
<li><b>幽影队</b>：首领化。依靠首领化幽影树站场吸能，圆号鱼和化蝶萌化对手降低生存压力，贝古斯抗伤清印记，公平鸽靠特性复制对面增益最后使用大量状态技能的情况下示弱后寒音蛇月光合奏/毒针推队。</li>
<li><b>四随机上分队</b>：最强精灵独角兽和第二强精灵黑猫带四个随机精灵上分，赢了+1～4颗星，尽管很多时候胜率不到50%还是可以轻松上大师。</li></ul>
</td>
</tr>
</tbody></table>
