<p>本页面用于介绍<a href="/%E8%85%BE%E8%AE%AF" title="腾讯">腾讯</a>旗下<a href="/MOBA" class="mw-redirect" title="MOBA">MOBA</a>手游《<a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80" title="王者荣耀">王者荣耀</a>》中的<b>装备</b>。
</p>

<div class="mw-heading mw-heading2"><h2 id="简介"><span id=".E7.AE.80.E4.BB.8B"></span>简介</h2></div>
<p>装备（又称局内道具）是在对局中用金币购买用来提高自身面板属性的道具。
</p><p>分为攻击装备、法术装备、防御装备、移动装备、打野装备和游走装备。
</p><p>每一局初始金币为300，召唤师可以通过击败中立资源（野怪）和敌对资源（敌方英雄、小兵、防御塔）获取金币，在局内商店购买装备。游戏开始20秒内且仍然处在高地内则可以原价出售装备<span title="你知道的太多了" class="heimu">所以经常有人先买双草鞋然后快出高地塔的时候在卖掉买别的</span>。
</p><p>几个小件（价格低于300，开局就能买的）可以合成一个中件（大于300小于1000多的二级装备），几个中件可以合成一个大件（大约在2000左右或3000左右的三级装备）。在普通模式下，一个英雄只有六个装备栏，只能同时拥有六件装备。装备搭配可以提升英雄的多种属性，不同的英雄（甚至相同英雄在不同的版本中）的推荐出装是不同的。
</p><p>在“无限乱斗”模式中，会有一个宝石专用装备格子。在“觉醒之战”模式中，8分钟后会解锁第七个通用装备格子。
</p><p>同时，还有限时装备。在2025年春节版本“愿照九天”，血魔、辉月等装备被临时升级变化为版本限时装备。2025年7月的S40赛季“三分之地”则出现了真正意义上的限时装备“雌雄·双股”等，仅在单个赛季版本存在。
</p>
