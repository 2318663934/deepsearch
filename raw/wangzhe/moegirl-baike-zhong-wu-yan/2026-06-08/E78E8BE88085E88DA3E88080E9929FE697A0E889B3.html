<div class="mw-heading mw-heading2"><h2 id="简介"><span id=".E7.AE.80.E4.BB.8B"></span>简介</h2></div>
<p>钟无艳是一位机制简单、上手容易的重装战士型英雄，于英雄战迹时期就已上线。技能兼顾位移、爆发和团控。
</p><p>钟无艳的被动使得她造成伤害时有50%几率让敌方英雄石化，同时她每3秒还能获得一个基于最大生命值的护盾。一技能为短距离突进，后续衔接的强化普攻附带减速。二技能锤击地面的范围伤害极高，中心区域还能造成额外50%伤害。大招则是持续旋转攻击，外圈伤害更高，还能不断叠加移速和护盾，可配合闪现先手开团。
</p><p>钟无艳可走对抗路或打野位，出装多以半肉半输出为主。前期凭借二技能的高伤害和被动的护盾，对线时压制力极强。团战中则可利用石化控制敌方C位，为队友创造输出机会。
</p>

<div class="mw-heading mw-heading2"><h2 id="故事"><span id=".E6.95.85.E4.BA.8B"></span>故事</h2></div>
<p>南荒出生，唯有“力量”和“金钱”是生存之道，自幼为孤女的魔种混血钟无艳强悍地活了下来，并去到稷下习武，时不时往玄雍充军获得军佣。她曾一锤砸碎了铁链，参军魔种不再由铁链捆绑。这一举动并未受到惩罚，相反受到<a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80:%E5%AC%B4%E6%94%BF" title="王者荣耀:嬴政">嬴政</a>与诸大将的赏识，他们本意欲废除阻碍种族之间融合的条令，该事件成为改变时政方针的契机。
</p>
<table class="mw-collapsible mw-collapsed wikitable">
<tbody><tr>
<th>官方故事</th>
</tr>
<tr>
<td>
<p>强健，性感（自称），意志坚定（公认）的钟无艳以夺宝猎人的身份活跃在稷下，以“没有被钟无艳打劫过的人，并非真正的稷下学子”而闻名。个性集古怪、冷僻、高傲为一体，随时随地都能令敌我双方头痛不已，是连<a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80:%E8%80%81%E5%A4%AB%E5%AD%90" title="王者荣耀:老夫子">夫子</a>都感到棘手的角色。
</p><p>身为人与魔种的混血，钟无艳饱受歧视。从九岁开始，天赋神力就让那些认为可以随意欺辱她的人们尝到判断失误带来的骨折滋味。没多久，她流浪到稷下，以“花样挑战老师心理阴影极限”而声名大振。最后竟偷空三贤者的积蓄出走，令所有学子都痛斥她的忘恩负义。不到三年，钟无艳遍体鳞伤的归来，身后还有一整队杀手穷追不舍。夫子大度的再次收她入门，她不负众望恩将仇报——席卷了珍贵的典籍，顺便打劫了一大笔路费后离开。
</p><p>大约数年之前，行事永远出人意料的钟无艳找到了归宿：她和一个男人相爱并且生活在了一起——所有稷下学子都惊掉下巴，并且争相为可怜男人的生命安全下注……
</p><p>这场婚姻让她摇身一变成为齐国的王族（尽管他们并不情愿接受她），并豪爽的将稷下的土地正式赠送给了夫子。或许在她的心里，稷下某种意义上也是等同于“家”的存在。
</p><p>“安定”两个字永远都不适合钟无艳的人生。生命中的温暖没有持续太久。一场事故中，她的丈夫被潜伏的魔种所杀害。那些记忆中被忘却的孤独，再度涌现出来。无所留恋的她，回到了稷下。开始执着追寻魔种和魔种的秘密，因为爱人，血脉抑或强大而神秘的力量。
</p><p>想要阻挠她的人都得好好掂量下，自己的骨头是否硬到足以抵挡著名的百万吨大锤。
</p><p><br />
<b>“霸占！摧毁！破坏！”</b>
</p>
</td>
</tr>
</tbody></table>

钟无艳召唤大地之力获得300/600（+8%额外生命）护盾（3秒1次）。钟无艳造成伤害时50%几率对敌方英雄造成石化（持续0.75秒），每个敌方英雄在8秒内只会受到一次石化效果。</div></div><div class="Tab"><div class="TabLabelText"><span typeof="mw:File"><span title="一技能：狂飙突进/Storm and Stress（位移）"><img alt="一技能：狂飙突进/Storm and Stress（位移）" src="https://storage.moegirl.org.cn/moegirl/commons/e/ed/%E9%92%9F%E6%97%A0%E8%89%B31.png!/fw/90?v=20251206225349" decoding="async" width="90" height="90" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/e/ed/%E9%92%9F%E6%97%A0%E8%89%B31.png 1.5x" data-file-width="128" data-file-height="128" /></span></span></div><div class="TabContentText">
<dl><dt>狂飙突进/Storm and Stress<span style="font-size:80%;color:#555;">（位移）</span></dt>
<dd>冷却值：5/4.8/4.6/4.4/4.2/4　消耗：30</dd></dl>
钟无艳向前突进，强化下次普攻额外造成250/300/350/400/450/500（+50%额外物理攻击）物理伤害和25/30/35/40/45/50%减速（持续2秒）。<br />【飓风之锤】持续期间使用【狂飙突进】，位移速度略微下降。</div></div><div class="Tab"><div class="TabLabelText"><span typeof="mw:File"><span title="二技能：震慑打击/Shock and Awe（伤害）"><img alt="二技能：震慑打击/Shock and Awe（伤害）" src="https://storage.moegirl.org.cn/moegirl/commons/6/6a/%E9%92%9F%E6%97%A0%E8%89%B32.png!/fw/90?v=20251206225349" decoding="async" width="90" height="90" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/6/6a/%E9%92%9F%E6%97%A0%E8%89%B32.png 1.5x" data-file-width="128" data-file-height="128" /></span></span></div><div class="TabContentText">
<dl><dt>震慑打击/Shock and Awe<span style="font-size:80%;color:#555;">（伤害）</span></dt>
<dd>冷却值：7/6.7/6.4/6.1/5.8/5.5　消耗：35</dd></dl>
钟无艳用大锤猛击地面，对范围内的敌人造成700/840/980/1120/1260/1400（+200%额外物理攻击）物理伤害，对范围中心的敌人额外造成50%伤害。</div></div><div class="Tab"><div class="TabLabelText"><span typeof="mw:File"><span title="三技能：飓风之锤/Hurricane Hammer（伤害）"><img alt="三技能：飓风之锤/Hurricane Hammer（伤害）" src="https://storage.moegirl.org.cn/moegirl/commons/f/f9/%E9%92%9F%E6%97%A0%E8%89%B33.png!/fw/90?v=20251206225349" decoding="async" width="90" height="90" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/f/f9/%E9%92%9F%E6%97%A0%E8%89%B33.png 1.5x" data-file-width="128" data-file-height="128" /></span></span></div><div class="TabContentText">
<dl><dt>飓风之锤/Hurricane Hammer<span style="font-size:80%;color:#555;">（伤害）</span></dt>
<dd>冷却值：40/35/30　消耗：70</dd></dl>
钟无艳抡起大锤持续旋转获得10/15/20%移速并造成300/450/600（+100%额外物理攻击）物理伤害（每0.4秒1次，持续3.2秒），对外圈的敌人额外造成50%伤害。同时钟无艳获得5%移速和80/120/160（+3%额外生命）护盾（每0.4秒1次，最多4层）。</div></div></div>

<p><span typeof="mw:File"><a href="/File:%E7%A7%BB%E5%8A%A8_%E6%8A%B5%E6%8A%97%E4%B9%8B%E9%9D%B4.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/9/9c/%E7%A7%BB%E5%8A%A8_%E6%8A%B5%E6%8A%97%E4%B9%8B%E9%9D%B4.png!/fw/35?v=20251024040533" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/9/9c/%E7%A7%BB%E5%8A%A8_%E6%8A%B5%E6%8A%97%E4%B9%8B%E9%9D%B4.png!/fw/53?v=20251024040533 1.5x, https://storage.moegirl.org.cn/moegirl/commons/9/9c/%E7%A7%BB%E5%8A%A8_%E6%8A%B5%E6%8A%97%E4%B9%8B%E9%9D%B4.png 2x" data-file-width="64" data-file-height="64" /></a></span> <span typeof="mw:File"><a href="/File:%E6%94%BB%E5%87%BB_%E6%9A%97%E5%BD%B1%E6%88%98%E6%96%A7.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/f/fd/%E6%94%BB%E5%87%BB_%E6%9A%97%E5%BD%B1%E6%88%98%E6%96%A7.png!/fw/35?v=20251024040533" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/f/fd/%E6%94%BB%E5%87%BB_%E6%9A%97%E5%BD%B1%E6%88%98%E6%96%A7.png!/fw/53?v=20251024040533 1.5x, https://storage.moegirl.org.cn/moegirl/commons/f/fd/%E6%94%BB%E5%87%BB_%E6%9A%97%E5%BD%B1%E6%88%98%E6%96%A7.png 2x" data-file-width="64" data-file-height="64" /></a></span> <span typeof="mw:File"><a href="/File:%E9%98%B2%E5%BE%A1_%E5%86%B0%E9%9C%9C%E5%86%B2%E5%87%BB.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/0/0d/%E9%98%B2%E5%BE%A1_%E5%86%B0%E9%9C%9C%E5%86%B2%E5%87%BB.png!/fw/35?v=20251024081736" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/0/0d/%E9%98%B2%E5%BE%A1_%E5%86%B0%E9%9C%9C%E5%86%B2%E5%87%BB.png!/fw/53?v=20251024081736 1.5x, https://storage.moegirl.org.cn/moegirl/commons/0/0d/%E9%98%B2%E5%BE%A1_%E5%86%B0%E9%9C%9C%E5%86%B2%E5%87%BB.png 2x" data-file-width="64" data-file-height="64" /></a></span> <span typeof="mw:File"><a href="/File:%E6%94%BB%E5%87%BB_%E7%A0%B4%E9%AD%94%E5%88%80.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/d/d0/%E6%94%BB%E5%87%BB_%E7%A0%B4%E9%AD%94%E5%88%80.png!/fw/35?v=20251024075321" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/d/d0/%E6%94%BB%E5%87%BB_%E7%A0%B4%E9%AD%94%E5%88%80.png!/fw/53?v=20251024075321 1.5x, https://storage.moegirl.org.cn/moegirl/commons/d/d0/%E6%94%BB%E5%87%BB_%E7%A0%B4%E9%AD%94%E5%88%80.png 2x" data-file-width="64" data-file-height="64" /></a></span> <span typeof="mw:File"><a href="/File:%E9%98%B2%E5%BE%A1_%E4%B8%8D%E7%A5%A5%E5%BE%81%E5%85%86.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/a/a0/%E9%98%B2%E5%BE%A1_%E4%B8%8D%E7%A5%A5%E5%BE%81%E5%85%86.png!/fw/35?v=20251024081737" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/a/a0/%E9%98%B2%E5%BE%A1_%E4%B8%8D%E7%A5%A5%E5%BE%81%E5%85%86.png!/fw/53?v=20251024081737 1.5x, https://storage.moegirl.org.cn/moegirl/commons/a/a0/%E9%98%B2%E5%BE%A1_%E4%B8%8D%E7%A5%A5%E5%BE%81%E5%85%86.png 2x" data-file-width="64" data-file-height="64" /></a></span> <span typeof="mw:File"><a href="/File:%E9%98%B2%E5%BE%A1_%E9%9C%B8%E8%80%85%E9%87%8D%E8%A3%85.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/6/6e/%E9%98%B2%E5%BE%A1_%E9%9C%B8%E8%80%85%E9%87%8D%E8%A3%85.png!/fw/35?v=20251024081736" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/6/6e/%E9%98%B2%E5%BE%A1_%E9%9C%B8%E8%80%85%E9%87%8D%E8%A3%85.png!/fw/53?v=20251024081736 1.5x, https://storage.moegirl.org.cn/moegirl/commons/6/6e/%E9%98%B2%E5%BE%A1_%E9%9C%B8%E8%80%85%E9%87%8D%E8%A3%85.png 2x" data-file-width="64" data-file-height="64" /></a></span>
</p>
<ul><li>钟无艳霸道的石化能力会让其突入敌方阵型时造成巨大的混乱，当然这需要一定的肉装支持，让其支撑足够的时间。</li></ul>
<div class="mw-heading mw-heading3"><h3 id="铭文搭配建议"><span id=".E9.93.AD.E6.96.87.E6.90.AD.E9.85.8D.E5.BB.BA.E8.AE.AE"></span>铭文搭配建议</h3></div>
<p><span typeof="mw:File"><a href="/File:%E7%BA%A2_%E5%BC%82%E5%8F%98.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/3/3a/%E7%BA%A2_%E5%BC%82%E5%8F%98.png!/fw/35?v=20251024045754" decoding="async" width="35" height="41" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/3/3a/%E7%BA%A2_%E5%BC%82%E5%8F%98.png 1.5x" data-file-width="44" data-file-height="52" /></a></span> <span typeof="mw:File"><a href="/File:%E7%BB%BF_%E9%B9%B0%E7%9C%BC.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/9/99/%E7%BB%BF_%E9%B9%B0%E7%9C%BC.png!/fw/35?v=20251024045754" decoding="async" width="35" height="41" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/9/99/%E7%BB%BF_%E9%B9%B0%E7%9C%BC.png 1.5x" data-file-width="44" data-file-height="52" /></a></span> <span typeof="mw:File"><a href="/File:%E8%93%9D_%E8%B0%83%E5%92%8C.png" class="mw-file-description"><img src="https://storage.moegirl.org.cn/moegirl/commons/7/7e/%E8%93%9D_%E8%B0%83%E5%92%8C.png!/fw/35?v=20251027131700" decoding="async" width="35" height="42" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/7/7e/%E8%93%9D_%E8%B0%83%E5%92%8C.png 1.5x" data-file-width="43" data-file-height="51" /></a></span>
</p>
<ul><li>调和提高最大生命以及移速加成，提升回复能力。鹰眼和异变提高物理攻击和物理穿透，在一定程度上的提高了钟无艳的伤害。</li></ul>
<div class="mw-heading mw-heading3"><h3 id="英雄关系"><span id=".E8.8B.B1.E9.9B.84.E5.85.B3.E7.B3.BB"></span>英雄关系</h3></div>
<ul><li><span typeof="mw:File"><a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80:%E8%99%9E%E5%A7%AC" title="王者荣耀:虞姬"><img src="https://storage.moegirl.org.cn/moegirl/commons/b/b4/%E8%99%9E%E5%A7%AC_icon.jpg!/fw/35?v=20251031184218" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/b/b4/%E8%99%9E%E5%A7%AC_icon.jpg!/fw/53?v=20251031184218 1.5x, https://storage.moegirl.org.cn/moegirl/commons/b/b4/%E8%99%9E%E5%A7%AC_icon.jpg!/fw/70?v=20251031184218 2x" data-file-width="150" data-file-height="150" /></a></span>：虞姬的被动减速配合钟无艳的石化可对敌方造成有效的压制。即便被抓，钟无艳的一技能也可以很好的护住虞姬。</li>
<li><span typeof="mw:File"><a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80:%E9%A9%AC%E5%8F%AF%E6%B3%A2%E7%BD%97" title="王者荣耀:马可波罗"><img src="https://storage.moegirl.org.cn/moegirl/commons/8/8f/%E9%A9%AC%E5%8F%AF%E6%B3%A2%E7%BD%97_icon.jpg!/fw/35?v=20251027131644" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/8/8f/%E9%A9%AC%E5%8F%AF%E6%B3%A2%E7%BD%97_icon.jpg!/fw/53?v=20251027131644 1.5x, https://storage.moegirl.org.cn/moegirl/commons/8/8f/%E9%A9%AC%E5%8F%AF%E6%B3%A2%E7%BD%97_icon.jpg!/fw/70?v=20251027131644 2x" data-file-width="150" data-file-height="150" /></a></span>：团战中，钟无艳开启大招作为先手，马可作为后手，是一个很强力的可控可输出的组合。</li>
<li><span typeof="mw:File"><a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80:%E9%92%9F%E9%A6%97" title="王者荣耀:钟馗"><img src="https://storage.moegirl.org.cn/moegirl/commons/c/ca/%E9%92%9F%E9%A6%97_icon.jpg!/fw/35?v=20251026091221" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/c/ca/%E9%92%9F%E9%A6%97_icon.jpg!/fw/53?v=20251026091221 1.5x, https://storage.moegirl.org.cn/moegirl/commons/c/ca/%E9%92%9F%E9%A6%97_icon.jpg!/fw/70?v=20251026091221 2x" data-file-width="150" data-file-height="150" /></a></span>：钟馗本身没有位移技能，面对钟无艳很是吃亏。即便钟无艳没有大招，被勾过去仍可以选择一技能逃跑。</li>
<li><span typeof="mw:File"><a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80:%E5%85%B0%E9%99%B5%E7%8E%8B" title="王者荣耀:兰陵王"><img src="https://storage.moegirl.org.cn/moegirl/commons/8/81/%E5%85%B0%E9%99%B5%E7%8E%8B_icon.jpg!/fw/35?v=20251026050030" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/8/81/%E5%85%B0%E9%99%B5%E7%8E%8B_icon.jpg!/fw/53?v=20251026050030 1.5x, https://storage.moegirl.org.cn/moegirl/commons/8/81/%E5%85%B0%E9%99%B5%E7%8E%8B_icon.jpg!/fw/70?v=20251026050030 2x" data-file-width="150" data-file-height="150" /></a></span>：钟无艳可在兰陵王靠近时靠近我方后排时释放一二技能，不给兰陵王近身的机会。即便兰陵王隐身秒掉了我方后排，也会被钟无艳石化，以命换命。</li>
<li><span typeof="mw:File"><a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80:%E9%A1%B9%E7%BE%BD" title="王者荣耀:项羽"><img src="https://storage.moegirl.org.cn/moegirl/commons/d/d8/%E9%A1%B9%E7%BE%BD_icon.jpg!/fw/35?v=20251028092705" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/d/d8/%E9%A1%B9%E7%BE%BD_icon.jpg!/fw/53?v=20251028092705 1.5x, https://storage.moegirl.org.cn/moegirl/commons/d/d8/%E9%A1%B9%E7%BE%BD_icon.jpg!/fw/70?v=20251028092705 2x" data-file-width="150" data-file-height="150" /></a></span>：钟无艳在大招期间，项羽能将她推开限制她对友方英雄的输出与控制。</li>
<li><span typeof="mw:File"><a href="/%E7%8E%8B%E8%80%85%E8%8D%A3%E8%80%80:%E8%B2%82%E8%9D%89" title="王者荣耀:貂蝉"><img src="https://storage.moegirl.org.cn/moegirl/commons/c/cc/%E8%B2%82%E8%9D%89_icon.jpg!/fw/35?v=20251026051605" decoding="async" width="35" height="35" class="mw-file-element" srcset="https://storage.moegirl.org.cn/moegirl/commons/c/cc/%E8%B2%82%E8%9D%89_icon.jpg!/fw/53?v=20251026051605 1.5x, https://storage.moegirl.org.cn/moegirl/commons/c/cc/%E8%B2%82%E8%9D%89_icon.jpg!/fw/70?v=20251026051605 2x" data-file-width="150" data-file-height="150" /></a></span>：灵活的貂蝉会让钟无艳的技能很难打中她。</li></ul>

<div class="mw-heading mw-heading2"><h2 id="历史上的TA"><span id=".E5.8E.86.E5.8F.B2.E4.B8.8A.E7.9A.84TA"></span>历史上的TA</h2></div>
<p>钟无艳，史称钟离春，后世以无盐之名称世。故事始见于《列女传·辩通传》，但更多地见于民间传说。说她是齐国出了名的丑女，但见识高远，才华横溢齐宣王。齐宣王时，齐国处在内外交困的危机之中，无盐去见了齐宣王，说服齐王改弦更张，发奋图治，从而导致齐国的中兴，使其成为了战国中期最富庶、最强大的国家。因此，齐宣王立无盐为后。当然，齐宣王时齐国中兴是真的，但是不是因为无盐，还无确证。无盐的故事，只是美色祸国论的又一种传说中的例证。
